context:
  version: "0.0.1"

package:
  name: listandstruct
  version: ${{ version }}

source:
  path: .

build:
  number: 0
  noarch: python
  script: pip install --no-deps --no-build-isolation .
  python:
    entry_points: []

requirements:
  host:
    - python >=3.14
    - pip
    - hatchling
  run:
    - python >=3.14
    - pandas
    - pyarrow
    - numpy

tests:
  - python:
      imports:
        - listandstruct

about:
  summary: Helpers for pandas and pyarrow list/struct arrays
  license: MIT
  license_file: LICENSE
